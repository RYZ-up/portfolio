      /* ── Back button ── */

        padding: 13px 32px;

        font-size: 0.70rem;
        font-weight: 400;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-decoration: none;
        transition: color 0.3s, border-color 0.3s, background 0.3s, box-shadow 0.3s;
        position: relative;
        z-index: 1;
      }
      .back-btn:hover {
        color: var(--text);
        border-color: rgba(168,85,247,0.5);
        background: rgba(168,85,247,0.06);
        box-shadow: 0 0 24px rgba(168,85,247,0.1);
      }
      .back-btn svg {
        transition: transform 0.3s;
        flex-shrink: 0;
      }
      .back-btn:hover svg { transform: translateX(-3px); }

      /* Keep landing__cta-zone always visible (no fade-in needed) */

        animation: none !important;

    <script>
      // Stars — même logique que main.js
      (function initStars() {
        const rand = () => Math.floor(Math.random() * 2000);
        function shadows(n) {
          const parts = [];
          for (let i = 0; i < n; i++) parts.push(rand() + 'px ' + rand() + 'px #FFF');
          return parts.join(', ');
        }
        const s1 = shadows(700), s2 = shadows(200), s3 = shadows(100);
        const style = document.createElement('style');
        style.textContent = [
          '#stars        { box-shadow: ' + s1 + '; }',
          '#stars::after  { box-shadow: ' + s1 + '; }',
          '#stars2        { box-shadow: ' + s2 + '; }',
          '#stars2::after { box-shadow: ' + s2 + '; }',
          '#stars3        { box-shadow: ' + s3 + '; }',
          '#stars3::after { box-shadow: ' + s3 + '; }',
        ].join('\n');
        document.head.appendChild(style);
      })();

      // Clock
      (function initClock() {
        const timeEl = document.getElementById('clockTime');
        const tzEl   = document.getElementById('clockTz');
        if (!timeEl) return;
        function tick() {
          const now = new Date();
          timeEl.textContent = now.toLocaleTimeString('fr-FR', {
            timeZone: 'Europe/Paris',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
          });
          if (tzEl) {
            const parisMs = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
            const utcMs   = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
            tzEl.textContent = Math.round((parisMs - utcMs) / 3600000) === 2 ? 'CEST' : 'CET';
          }
        }
        tick();
        setInterval(tick, 1000);
      })();

      // Social popup toggle
      (function initSocPopup() {
        const btn   = document.getElementById('socBtn');
        const popup = document.getElementById('socPopup');
        if (!btn || !popup) return;
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const open = popup.classList.toggle('is-open');
          btn.classList.toggle('is-active', open);
          btn.setAttribute('aria-expanded', String(open));
          popup.setAttribute('aria-hidden', String(!open));
        });
        popup.addEventListener('click', e => e.stopPropagation());
        document.addEventListener('click', () => {
          popup.classList.remove('is-open');
          btn.classList.remove('is-active');
          btn.setAttribute('aria-expanded', 'false');
          popup.setAttribute('aria-hidden', 'true');
        });
      })();

      // Trigger landing CSS entrance animations
      document.body.classList.add('is-ready');
    </script>
