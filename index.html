<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Rayane YAZID — Developer &amp; Engineer"
    />
    <title>Rayane YAZID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Preload first project assets for instant display -->
    <link rel="preload" href="assets/p1/hero.jpg" as="image" />
    <link rel="preload" href="assets/p1/preview.mp4" as="video" type="video/mp4" />
  </head>
  <body>
    <!-- Parallax stars -->
    <div id="stars" aria-hidden="true"></div>
    <div id="stars2" aria-hidden="true"></div>
    <div id="stars3" aria-hidden="true"></div>

    <!-- Grain -->
    <div class="grain" aria-hidden="true"></div>

    <!-- Board / Flare background — shown once on app enter -->
    <div class="board-wrap" id="boardWrap" aria-hidden="true">
      <div class="board">
        <div class="colors"></div>
        <div class="flare">
          <span></span>
        </div>
      </div>
      <div class="page"></div>
    </div>

    <!-- ── SITE NAV (visible on landing, hidden in app) ── -->
    <nav class="site-nav" id="siteNav" aria-label="Navigation principale">
      <!-- Left: email -->
      <div class="sn__left">
        <a
          href="mailto:rayane.yazid.pro@gmail.com"
          class="sn__email"
          data-cursor="Email"
          >rayane.yazid.pro@gmail.com</a
        >
      </div>

      <!-- Center: clock -->
      <div class="sn__center" aria-live="polite" aria-atomic="true" data-cursor="Local time">
        <span class="sn__clock-val" id="clockTime">--:--:--</span>
        <span class="sn__clock-tz" id="clockTz">CET</span>
      </div>

      <!-- Right: availability + lang + social -->
      <div class="sn__right">
        <span class="sn__avail">
          <span class="sn__avail-dot" aria-hidden="true"></span>
        </span>
        <div class="sn__divider" aria-hidden="true"></div>
        <div class="sn__lang-group" id="langGroup">
          <button
            class="sn__lang"
            id="langBtn"
            aria-label="Change language"
            aria-expanded="false"
            data-cursor="Language"
          >
            EN
          </button>
          <div class="sn__lang-dd" id="langDropdown" aria-hidden="true">
            <button class="sn__lang-opt" data-lang="fr">
              Français
            </button>
            <button class="sn__lang-opt is-active" data-lang="en">English</button>
            <button class="sn__lang-opt" data-lang="es">Español</button>
            <button class="sn__lang-opt" data-lang="ar">العربية</button>
          </div>
        </div>
        <div class="sn__divider" aria-hidden="true"></div>
        <div class="sn__soc-wrap">
          <button
            class="sn__socbtn"
            id="socBtn"
            aria-label="Social links"
            aria-expanded="false"
            data-cursor="Links"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"
              />
              <path
                d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"
              />
            </svg>
          </button>
          <!-- Social popup — white square, right-anchored -->
          <div class="soc-popup" id="socPopup" aria-hidden="true">
            <a
              href="https://github.com/RYZ-up"
              class="soc-popup__item"
              target="_blank"
              rel="noopener"
              data-cursor="GitHub"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                />
              </svg>
              <span>GitHub</span>
            </a>
            <a
              href="https://www.linkedin.com/in/rayane-yazid/"
              class="soc-popup__item"
              target="_blank"
              rel="noopener"
              data-cursor="LinkedIn"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                />
              </svg>
              <span>LinkedIn</span>
            </a>
            <a
              href="mailto:rayane.yazid.pro@gmail.com"
              class="soc-popup__item"
              data-cursor="Email"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7" />
              </svg>
              <span>Email</span>
            </a>
            <a
              href="assets/cv.pdf"
              class="soc-popup__item"
              target="_blank"
              rel="noopener"
              data-cursor="CV"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
              <span>CV</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- ── APP BACK BUTTON (floating, shown in app mode) ── -->
    <button
      class="app__back"
      id="appBack"
      aria-label="Back to home"
      aria-hidden="true"
      data-cursor="Home"
    >
      <svg
        width="15"
        height="15"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </button>

    <!-- ── LOADER ─────────────────────────────────── -->
    <div class="loader" id="loader" aria-hidden="true">
      <div class="loader__body">
        <span class="loader__logo">RY.</span>
        <div class="loader__bar-wrap">
          <div class="loader__bar" id="loaderBar"></div>
        </div>
        <span class="loader__pct" id="loaderPct">0%</span>
      </div>
    </div>

    <!-- ── LANDING ────────────────────────────────── -->
    <section class="landing" id="landing" aria-label="Accueil">
      <div class="landing__bg" aria-hidden="true"></div>

      <div class="landing__content">
        <p class="landing__eyebrow">Portfolio 2026</p>
        <h1 class="landing__name">
          <span class="line-reveal" data-cursor="First name"><span>Rayane</span></span>
          <span class="line-reveal" data-cursor="Last name"
            ><span><em>YAZID</em></span></span
          >
        </h1>
        <p class="landing__role">Developer · Apprentice Engineer</p>

        <div class="landing__cta-zone">
        <div class="btn-wrapper">
          <button class="btn" id="landingBtn" data-cursor="All my projects">
            <svg class="btn-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z"/>
            </svg>
            <div class="txt-wrapper">
              <div class="txt-1">
                <span class="btn-letter">E</span>
                <span class="btn-letter">x</span>
                <span class="btn-letter">p</span>
                <span class="btn-letter">l</span>
                <span class="btn-letter">o</span>
                <span class="btn-letter">r</span>
                <span class="btn-letter">e</span>
              </div>
              <div class="txt-2">
                <span class="btn-letter">E</span>
                <span class="btn-letter">x</span>
                <span class="btn-letter">p</span>
                <span class="btn-letter">l</span>
                <span class="btn-letter">o</span>
                <span class="btn-letter">r</span>
                <span class="btn-letter">i</span>
                <span class="btn-letter">n</span>
                <span class="btn-letter">g</span>
              </div>
            </div>
          </button>
        </div>

        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="100%"
          width="100%"
          style="position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none;"
          aria-hidden="true"
        >
          <defs>
            <pattern
              patternUnits="userSpaceOnUse"
              height="30"
              width="30"
              id="dottedGridBtn"
            >
              <circle fill="rgba(0,0,0,0.15)" r="1" cy="2" cx="2"></circle>
            </pattern>
          </defs>
          <rect fill="url(#dottedGridBtn)" height="100%" width="100%"></rect>
        </svg>
      </div>

      </div>

      <!-- Large footer with info -->
      <footer class="landing__footer" aria-label="Informations">
        <div class="lf__identity">
          <span class="lf__name">Rayane YAZID</span>
          <span class="lf__sub">Apprentice Engineer</span>
        </div>
        <div class="lf__status">
          <span class="lf__status-label">Available for</span>
          <span class="lf__status-value">Internship · Apprenticeship · CDI</span>
        </div>
        <div class="lf__links">
          <a
            href="https://www.linkedin.com/in/rayane-yazid/"
            class="lf__link"
            target="_blank" rel="noopener"
            aria-label="LinkedIn"
            data-cursor="LinkedIn"
            >LinkedIn</a
          >
          <a
            href="https://github.com/RYZ-up"
            class="lf__link"
            target="_blank" rel="noopener"
            aria-label="GitHub"
            data-cursor="GitHub"
            >GitHub</a
          >
          <a
            href="mailto:rayane.yazid.pro@gmail.com"
            class="lf__link"
            aria-label="Email"
            data-cursor="Email"
            >Email</a
          >
        </div>
        <span class="lf__copy">© 2026 Rayane YAZID — All rights reserved</span>
      </footer>
    </section>

    <!-- ── APP ───────────────────────────────────── -->
    <div class="app" id="app" aria-hidden="true">

      <!-- ── LEFT: roulette list ── -->
      <aside class="proj-list" id="projList" aria-label="Projets">
        <div class="pl__wheel">
          <div class="pl__scroller" id="plScroller"></div>
        </div>
      </aside>

      <!-- ── RIGHT: media view ── -->
      <main class="media-view" id="mediaView" aria-label="Aperçu projet">
        <div class="mv__track" id="mvTrack" aria-hidden="true"></div>

        <!-- Navigation (desktop: vertical between list/media · mobile: bottom bar) -->
        <div class="mv__nav">
          <button
            class="mv__nav-btn mv__nav-btn--up"
            id="mvUp"
            aria-label="Projet précédent"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m18 15-6-6-6 6" />
            </svg>
          </button>
          <button class="mv__detail-btn" id="mvDetail" aria-label="Voir les détails du projet">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <span>Détails</span>
          </button>
          <button
            class="mv__nav-btn mv__nav-btn--down"
            id="mvDown"
            aria-label="Projet suivant"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>
        </div>
      </main>
    </div>

    <!-- ── MODAL ─────────────────────────────────── -->
    <div
      class="drawer"
      id="drawer"
      role="dialog"
      aria-modal="true"
      aria-label="Détails du projet"
      aria-hidden="true"
    >
      <button
        class="drawer__close"
        id="drawerClose"
        aria-label="Fermer"
        data-cursor="Fermer"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
      <div class="drawer__scroll" id="drawerScroll">
        <!-- Dynamic content injected by openDrawer() -->
        <div id="drawerBody"></div>
      </div>
    </div>

    <!-- Custom cursor (animate-ui exact SVG path) -->
    <div class="cur-dot" id="curDot" aria-hidden="true">
      <svg
        width="24"
        height="24"
        viewBox="0 0 40 40"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          fill="currentColor"
          d="M1.8 4.4 7 36.2c.3 1.8 2.6 2.3 3.6.8l3.9-5.7c1.7-2.5 4.5-4.1 7.5-4.3l6.9-.5c1.8-.1 2.5-2.4 1.1-3.5L5 2.5c-1.4-1.1-3.5 0-3.3 1.9Z"
        />
      </svg>
    </div>
    <!-- Cursor follow label (like CursorFollow, side=bottom align=end) -->
    <div class="cur-follow" id="curFollow" aria-hidden="true"></div>

    <!-- Lightbox -->
    <div class="lb" id="lb" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Image agrandie">
      <div class="lb__backdrop" id="lbBackdrop"></div>
      <button class="lb__close" id="lbClose" aria-label="Fermer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="lb__frame">
        <img class="lb__img" id="lbImg" src="" alt="">
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
